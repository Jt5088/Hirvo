<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hirvo Resume Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
    <div id="error-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#dc2626;color:#fff;padding:12px 20px;font-family:monospace;font-size:13px;"></div>

    <header class="header">
        <div class="header-brand">
            <span class="brand-mark">H</span>
            <span class="brand-text">Hirvo Builder</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost" id="btn-clear">Clear</button>
            <button class="btn btn-ghost" id="btn-import">Import JSON</button>
            <button class="btn btn-ghost" id="btn-export-json">Export JSON</button>
            <button class="btn btn-primary" id="btn-export-pdf">Export PDF</button>
        </div>
    </header>

    <main class="app-layout">
        <!-- Left Panel: Form -->
        <aside class="panel panel-form" id="form-panel">
            <!-- Template Selector -->
            <div class="template-selector">
                <label class="form-label">Template</label>
                <div class="template-grid" id="template-grid"></div>
            </div>

            <!-- Form Sections -->
            <div class="form-sections" id="form-sections">
                <!-- Personal Info -->
                <div class="form-section" data-section="personal">
                    <button class="section-header" type="button">
                        <span class="section-title">Personal Information</span>
                        <span class="section-chevron">&#9662;</span>
                    </button>
                    <div class="section-body">
                        <div class="field-row">
                            <div class="field">
                                <label class="form-label" for="firstName">First Name</label>
                                <input type="text" id="firstName" class="form-input" data-path="personal.firstName" placeholder="John">
                            </div>
                            <div class="field">
                                <label class="form-label" for="lastName">Last Name</label>
                                <input type="text" id="lastName" class="form-input" data-path="personal.lastName" placeholder="Doe">
                            </div>
                        </div>
                        <div class="field">
                            <label class="form-label" for="title">Job Title</label>
                            <input type="text" id="title" class="form-input" data-path="personal.title" placeholder="Software Engineer">
                        </div>
                        <div class="field">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" id="email" class="form-input" data-path="personal.email" placeholder="john@example.com">
                        </div>
                        <div class="field">
                            <label class="form-label" for="phone">Phone</label>
                            <input type="tel" id="phone" class="form-input" data-path="personal.phone" placeholder="+1 (555) 123-4567">
                        </div>
                        <div class="field">
                            <label class="form-label" for="location">Location</label>
                            <input type="text" id="location" class="form-input" data-path="personal.location" placeholder="San Francisco, CA">
                        </div>
                        <div class="field">
                            <label class="form-label" for="website">Website</label>
                            <input type="url" id="website" class="form-input" data-path="personal.website" placeholder="https://johndoe.com">
                        </div>
                        <div class="field">
                            <label class="form-label" for="linkedin">LinkedIn</label>
                            <input type="text" id="linkedin" class="form-input" data-path="personal.linkedin" placeholder="linkedin.com/in/johndoe">
                        </div>
                        <div class="field">
                            <label class="form-label" for="summary">Professional Summary</label>
                            <textarea id="summary" class="form-input form-textarea" data-path="personal.summary" rows="4" placeholder="Brief professional summary..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Experience -->
                <div class="form-section" data-section="experience">
                    <button class="section-header" type="button">
                        <span class="section-title">Experience</span>
                        <span class="section-chevron">&#9662;</span>
                    </button>
                    <div class="section-body">
                        <div class="dynamic-list" id="experience-list"></div>
                        <button class="btn btn-add" data-list="experience">+ Add Experience</button>
                    </div>
                </div>

                <!-- Education -->
                <div class="form-section" data-section="education">
                    <button class="section-header" type="button">
                        <span class="section-title">Education</span>
                        <span class="section-chevron">&#9662;</span>
                    </button>
                    <div class="section-body">
                        <div class="dynamic-list" id="education-list"></div>
                        <button class="btn btn-add" data-list="education">+ Add Education</button>
                    </div>
                </div>

                <!-- Skills -->
                <div class="form-section" data-section="skills">
                    <button class="section-header" type="button">
                        <span class="section-title">Skills</span>
                        <span class="section-chevron">&#9662;</span>
                    </button>
                    <div class="section-body">
                        <div class="dynamic-list" id="skills-list"></div>
                        <button class="btn btn-add" data-list="skills">+ Add Skill Category</button>
                    </div>
                </div>

                <!-- Languages -->
                <div class="form-section" data-section="languages">
                    <button class="section-header" type="button">
                        <span class="section-title">Languages</span>
                        <span class="section-chevron">&#9662;</span>
                    </button>
                    <div class="section-body">
                        <div class="dynamic-list" id="languages-list"></div>
                        <button class="btn btn-add" data-list="languages">+ Add Language</button>
                    </div>
                </div>

                <!-- Certifications -->
                <div class="form-section" data-section="certifications">
                    <button class="section-header" type="button">
                        <span class="section-title">Certifications</span>
                        <span class="section-chevron">&#9662;</span>
                    </button>
                    <div class="section-body">
                        <div class="dynamic-list" id="certifications-list"></div>
                        <button class="btn btn-add" data-list="certifications">+ Add Certification</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right Panel: Preview -->
        <section class="panel panel-preview">
            <div class="preview-container" id="preview-container">
                <iframe id="preview-frame" title="Resume Preview"></iframe>
            </div>
        </section>
    </main>

    <input type="file" id="import-file" accept=".json" style="display:none">

    <!-- Templates -->
    <script src="src/templates/classic.js"></script>
    <script src="src/templates/modern.js"></script>
    <script src="src/templates/simple.js"></script>
    <script src="src/templates/design.js"></script>
    <script src="src/templates/elegant.js"></script>
    <script src="src/templates/perfecto.js"></script>
    <script src="src/templates/professional.js"></script>
    <script src="src/templates/creative.js"></script>

    <!-- Core Modules -->
    <script src="src/js/template-engine.js"></script>
    <script src="src/js/sample-data.js"></script>
    <script src="src/js/preview.js"></script>
    <script src="src/js/export.js"></script>
    <script src="src/js/storage.js"></script>
    <script src="src/js/form-handler.js"></script>
    <script src="src/js/app.js"></script>

    <script>
    (function() {
        var missing = [];
        if (typeof TemplateEngine === 'undefined') missing.push('TemplateEngine');
        if (typeof SampleData === 'undefined') missing.push('SampleData');
        if (typeof ResumePreview === 'undefined') missing.push('ResumePreview');
        if (typeof ResumeExport === 'undefined') missing.push('ResumeExport');
        if (typeof ResumeStorage === 'undefined') missing.push('ResumeStorage');
        if (typeof FormHandler === 'undefined') missing.push('FormHandler');
        if (typeof App === 'undefined') missing.push('App');
        if (missing.length) {
            var banner = document.getElementById('error-banner');
            banner.style.display = 'block';
            banner.textContent = 'Missing module: ' + missing.join(', ');
        }
    })();
    window.onerror = function(msg, url, line) {
        var banner = document.getElementById('error-banner');
        banner.style.display = 'block';
        banner.textContent = 'JS Error: ' + msg + ' at ' + url + ':' + line;
    };
    </script>
</body>
</html>
