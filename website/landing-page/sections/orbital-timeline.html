<!-- Orbital Timeline — Recruiter Screening Visualization -->
<section class="section" id="recruiter-sim" aria-labelledby="ot-h">
  <div class="wrap">
    <div class="ot-head reveal">
      <span class="lbl lbl-c">Recruiter Simulation</span>
      <h2 class="t-h2" id="ot-h">See exactly how recruiters screen you</h2>
      <p class="ot-sub">Watch a real recruiter screening unfold &mdash; from the ATS parse to the final verdict. Every step, every filter, every decision point exposed.</p>
    </div>
    <div class="ot-container reveal" id="orbital-timeline" role="img" aria-label="Interactive orbital diagram showing 5 stages of recruiter screening">

      <!-- CPU Architecture SVG — center piece -->
      <div class="ot-cpu">
        <svg class="ot-cpu-svg" viewBox="0 0 200 100">
          <!-- CPU chip -->
          <g>
            <!-- Main chip body -->
            <rect x="85" y="40" width="30" height="20" rx="2" fill="var(--surf,#131316)" filter="url(#cpu-light-shadow)"/>
            <!-- Chip label -->
            <text x="100" y="53" font-size="5.5" fill="url(#cpu-text-gradient)" font-weight="700" letter-spacing="0.1em" text-anchor="middle">HIRVO</text>
          </g>

          <defs>
            <filter id="cpu-light-shadow" x="-80%" y="-80%" width="260%" height="260%">
              <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="white" flood-opacity="0.12"/>
              <feDropShadow dx="1.5" dy="1.5" stdDeviation="1" flood-color="black" flood-opacity="0.1"/>
            </filter>

            <linearGradient id="cpu-text-gradient" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#AAAAAA"><animate attributeName="offset" values="-2; -1; 0" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></stop>
              <stop offset="25%" stop-color="white"><animate attributeName="offset" values="-1; 0; 1" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></stop>
              <stop offset="50%" stop-color="#AAAAAA"><animate attributeName="offset" values="0; 1; 2" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></stop>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <!-- Orbit ring (sized by JS) -->
      <div class="ot-ring" id="ot-ring"></div>

      <!-- Nodes appended by js/orbital-timeline.js -->
    </div>
  </div>
</section>
