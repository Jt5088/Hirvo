<!-- Orbital Timeline — Recruiter Screening Visualization -->
<section class="section" id="recruiter-sim" aria-labelledby="ot-h">
  <div class="wrap">
    <div class="ot-head">
      <span class="lbl lbl-c reveal-l">Recruiter Simulation</span>
      <h2 class="t-h2 reveal-h d1" id="ot-h">See exactly how recruiters screen you</h2>
      <p class="ot-sub reveal-f d2">Watch a real recruiter screening unfold &mdash; from the ATS parse to the final verdict. Every step, every filter, every decision point exposed.</p>
    </div>
    <div class="ot-container reveal" id="orbital-timeline" role="img" aria-label="Interactive orbital diagram showing 5 stages of recruiter screening">

      <!-- CPU Architecture SVG — center piece -->
      <div class="ot-cpu">
        <svg class="ot-cpu-svg" viewBox="0 0 200 100">
          <defs>
            <linearGradient id="cpu-body" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#1a1a1f"/>
              <stop offset="100%" stop-color="#131316"/>
            </linearGradient>
            <filter id="cpu-lift" x="-6%" y="-6%" width="112%" height="125%">
              <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#000" flood-opacity="0.5"/>
            </filter>
            <linearGradient id="cpu-text-gradient" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%"   stop-color="#7A7A76"/>
              <stop offset="10%"  stop-color="#868684"/>
              <stop offset="22%"  stop-color="#9A9892"/>
              <stop offset="34%"  stop-color="#B8B5AE"/>
              <stop offset="42%"  stop-color="#D4D0C8"/>
              <stop offset="47%"  stop-color="#E6E2DA"/>
              <stop offset="52%"  stop-color="#D4D0C8"/>
              <stop offset="62%"  stop-color="#A8A59E"/>
              <stop offset="72%"  stop-color="#9A9890"/>
              <stop offset="85%"  stop-color="#868684"/>
              <stop offset="100%" stop-color="#7A7A76"/>
            </linearGradient>
          </defs>

          <!-- Single chip block -->
          <rect x="75" y="36" width="50" height="28" rx="3" fill="url(#cpu-body)" stroke="rgba(255,255,255,0.07)" stroke-width="0.3" filter="url(#cpu-lift)"/>
          <text x="100" y="50" font-size="9" fill="url(#cpu-text-gradient)" font-weight="700" letter-spacing="0.12em" text-anchor="middle" dominant-baseline="central">HIRVO</text>
        </svg>
      </div>

      <!-- Orbit ring (sized by JS) -->
      <div class="ot-ring" id="ot-ring"></div>

      <!-- Nodes appended by js/orbital-timeline.js -->
    </div>
  </div>
</section>
